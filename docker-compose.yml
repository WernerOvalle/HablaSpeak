services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: habla
      POSTGRES_PASSWORD: speakpass
      POSTGRES_DB: hablaspeak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  hablaspeak:
    build:
      context: .
      dockerfile: Dockerfile
    image: hablaspeak:latest
    container_name: hablaspeak-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://habla:speakpass@db:5432/hablaspeak?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-hablaspeak-super-secret-key-123}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GROQ_STT_MODEL=${GROQ_STT_MODEL:-whisper-large-v3-turbo}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/free}
      - DAILY_AI_LIMIT=${DAILY_AI_LIMIT:-50}
      - INTERVIEW_BLOCK_SIZE=${INTERVIEW_BLOCK_SIZE:-4}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@hablaspeak.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
