services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: habla
      POSTGRES_PASSWORD: speakpass
      POSTGRES_DB: hablaspeak
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: unless-stopped

  hablaspeak:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    command: >
      sh -c "
        until npx prisma db push 2>/dev/null; do
          echo 'Esperando PostgreSQL...'; sleep 2;
        done &&
        node prisma/seed.js &&
        pnpm dev
      "
    environment:
      - NODE_ENV=development
      - CI=true
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - DATABASE_URL=postgresql://habla:speakpass@db:5432/hablaspeak?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-hablaspeak-super-secret-key-123}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GROQ_STT_MODEL=${GROQ_STT_MODEL:-whisper-large-v3-turbo}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/free}
      - AI_PROVIDER=${AI_PROVIDER:-}
      - DAILY_AI_LIMIT=${DAILY_AI_LIMIT:-50}
      - INTERVIEW_BLOCK_SIZE=${INTERVIEW_BLOCK_SIZE:-8}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@hablaspeak.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata_dev:
