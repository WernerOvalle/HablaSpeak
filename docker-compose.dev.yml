services:
  hablaspeak:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    command: sh -c "npx prisma generate && pnpm dev"
    environment:
      - NODE_ENV=development
      - CI=true
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - DATABASE_URL=postgresql://habla:speakpass@db:5432/hablaspeak?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-hablaspeak-super-secret-key-123}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GROQ_STT_MODEL=${GROQ_STT_MODEL:-whisper-large-v3-turbo}
      - INTERVIEW_BLOCK_SIZE=${INTERVIEW_BLOCK_SIZE:-4}
      - SEED_PREMIUM_EMAIL=${SEED_PREMIUM_EMAIL:-premium@hablaspeak.com}
      - SEED_PREMIUM_PASSWORD=${SEED_PREMIUM_PASSWORD:-Premium123!}
      - SEED_FREE_EMAIL=${SEED_FREE_EMAIL:-demo@hablaspeak.com}
      - SEED_FREE_PASSWORD=${SEED_FREE_PASSWORD:-Demo123!}
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - db
